<script>
        function toggleSplit(type) {
            const equalBtn = document.getElementById('btn-split-equal');
            const customBtn = document.getElementById('btn-split-custom');
            const selectionPanel = document.getElementById('custom-split-selection');

            if (type === 'equal') {
                equalBtn.classList.add('border-primary', 'bg-primary-container/5');
                equalBtn.querySelector('span:first-child').classList.replace('text-on-surface-variant', 'text-primary');
                equalBtn.querySelector('span:last-child').classList.replace('text-on-surface-variant', 'text-primary');
                
                customBtn.classList.remove('border-primary', 'bg-primary-container/5');
                customBtn.classList.add('border-outline-variant', 'bg-surface');
                customBtn.querySelector('span:first-child').classList.replace('text-primary', 'text-on-surface-variant');
                customBtn.querySelector('span:last-child').classList.replace('text-primary', 'text-on-surface-variant');
                
                selectionPanel.classList.add('hidden');
            } else {
                customBtn.classList.add('border-primary', 'bg-primary-container/5');
                customBtn.querySelector('span:first-child').classList.replace('text-on-surface-variant', 'text-primary');
                customBtn.querySelector('span:last-child').classList.replace('text-on-surface-variant', 'text-primary');
                
                equalBtn.classList.remove('border-primary', 'bg-primary-container/5');
                equalBtn.classList.add('border-outline-variant', 'bg-surface');
                equalBtn.querySelector('span:first-child').classList.replace('text-primary', 'text-on-surface-variant');
                equalBtn.querySelector('span:last-child').classList.replace('text-primary', 'text-on-surface-variant');
                
                selectionPanel.classList.remove('hidden');
            }
        }

        // Focus animation for input fields
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('border-primary');
                input.parentElement.classList.remove('border-outline-variant');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('border-primary');
                input.parentElement.classList.add('border-outline-variant');
            });
        });
    </script>
